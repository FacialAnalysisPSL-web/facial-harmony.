<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Facial Harmony Calculator</title>
<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:#1e293b;
padding:25px;
border-radius:10px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.result{
font-size:28px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>Facial Harmony Calculator</h1>

<p>Enter your facial ratios</p>

<input id="esr" placeholder="ESR (0.443 - 0.477)">
<input id="facialThirds" placeholder="Lower Third (%)">
<input id="neckWidth" placeholder="Neck Width (%)">
<input id="midface" placeholder="Midface Ratio">
<input id="jawAngle" placeholder="Jaw Frontal Angle">
<input id="bigonial" placeholder="Bigonial Width (%)">
<input id="eyebrowTilt" placeholder="Eyebrow Tilt (degrees)">
<input id="lipRatio" placeholder="Lower/Upper Lip Ratio">

<button onclick="calculate()">Calculate Harmony</button>

<div class="result" id="result"></div>

</div>

<script>

const MAX_SCORE = 333.71;
const WORST_SCORE = -337.71;

function scoreRange(value, min, max, goodScore, badScore){

if(value >= min && value <= max){
return goodScore;
}

let distance = Math.min(Math.abs(value-min), Math.abs(value-max));

return goodScore - distance*badScore;
}

function calculate(){

let score = 0;

let esr = parseFloat(document.getElementById("esr").value);
let thirds = parseFloat(document.getElementById("facialThirds").value);
let neck = parseFloat(document.getElementById("neckWidth").value);
let mid = parseFloat(document.getElementById("midface").value);
let jaw = parseFloat(document.getElementById("jawAngle").value);
let bigonial = parseFloat(document.getElementById("bigonial").value);
let brow = parseFloat(document.getElementById("eyebrowTilt").value);
let lips = parseFloat(document.getElementById("lipRatio").value);

score += scoreRange(esr,0.443,0.477,25.59,10);
score += scoreRange(thirds,30.6,34,18.3,5);
score += scoreRange(neck,90,100,19.06,5);
score += scoreRange(mid,0.95,1.01,11.9,3);
score += scoreRange(jaw,84.5,95,9.15,2);
score += scoreRange(bigonial,85.5,92,20,5);
score += scoreRange(brow,5,13,10,3);
score += scoreRange(lips,1.4,2,10,3);

let harmony = ((score - WORST_SCORE) / (MAX_SCORE - WORST_SCORE)) * 100;

document.getElementById("result").innerHTML =
"Harmony Score: " + harmony.toFixed(2) + "%";

}

</script>

</body>
</html>
