<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Facial Harmony Analyzer</title>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
}

canvas{
margin-top:20px;
border-radius:10px;
}

button{
padding:10px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
margin-top:15px;
}

.result{
font-size:28px;
margin-top:25px;
}

</style>
</head>

<body>

<div class="container">

<h1>Facial Harmony Calculator</h1>

<p>Upload a face photo</p>

<input type="file" id="upload">

<br>

<canvas id="canvas"></canvas>

<div class="result" id="result"></div>

</div>

<script>

const MAX_SCORE = 333.71
const WORST_SCORE = -337.71

async function loadModels(){

await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js/weights')
await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js/weights')

}

function distance(a,b){

return Math.sqrt(
Math.pow(a.x-b.x,2)+Math.pow(a.y-b.y,2)
)

}

function scoreRange(value,min,max,good,bad){

if(value>=min && value<=max){
return good
}

let d=Math.min(Math.abs(value-min),Math.abs(value-max))

return good-(d*bad)

}

document.getElementById("upload").addEventListener("change", async function(){

const file=this.files[0]

if(!file)return

const img=new Image()

img.src=URL.createObjectURL(file)

img.onload=async function(){

const canvas=document.getElementById("canvas")

canvas.width=img.width
canvas.height=img.height

const ctx=canvas.getContext("2d")

ctx.drawImage(img,0,0)

const detection=await faceapi.detectSingleFace(
img,
new faceapi.TinyFaceDetectorOptions()
).withFaceLandmarks()

if(!detection){

alert("No face detected")
return

}

const points=detection.landmarks.positions

let leftEye=points[36]
let rightEye=points[45]
let jawLeft=points[0]
let jawRight=points[16]
let nose=points[30]
let chin=points[8]
let lipTop=points[51]
let lipBottom=points[57]

let eyeDistance=distance(leftEye,rightEye)
let jawWidth=distance(jawLeft,jawRight)

let esr=eyeDistance/jawWidth

let score=0

score+=scoreRange(esr,0.44,0.48,25,10)

let midface=distance(nose,lipTop)/distance(nose,chin)

score+=scoreRange(midface,0.95,1.01,12,4)

let lipRatio=distance(lipBottom,chin)/distance(lipTop,lipBottom)

score+=scoreRange(lipRatio,1.4,2,10,3)

let harmony=((score-WORST_SCORE)/(MAX_SCORE-WORST_SCORE))*100

document.getElementById("result").innerHTML=

"Harmony Score: "+harmony.toFixed(2)+"%"

}

})

loadModels()

</script>

</body>
</html>
