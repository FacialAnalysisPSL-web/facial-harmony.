<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>Facial Harmony Analyzer</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>

body{
background:#0d0d0d;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
border:2px solid white;
margin-top:20px;
max-width:90%;
}

input{
margin-top:20px;
font-size:16px;
}

#result{
margin-top:20px;
font-size:22px;
}

</style>

</head>

<body>

<h1>Facial Harmony Analyzer</h1>

<p>Sube una foto frontal del rostro</p>

<input type="file" id="upload" accept="image/*">

<br>

<canvas id="canvas"></canvas>

<div id="result"></div>

<script>

const upload = document.getElementById("upload")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

const faceMesh = new FaceMesh({
locateFile:(file)=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
}
})

faceMesh.setOptions({
maxNumFaces:1,
refineLandmarks:true,
minDetectionConfidence:0.5,
minTrackingConfidence:0.5
})

faceMesh.onResults(onResults)

upload.addEventListener("change",function(e){

const file = e.target.files[0]

if(!file) return

const img = new Image()

img.onload = async function(){

canvas.width = img.width
canvas.height = img.height

ctx.drawImage(img,0,0)

await faceMesh.send({image:img})

}

img.src = URL.createObjectURL(file)

})

function distance(a,b){

return Math.sqrt(
Math.pow(a.x-b.x,2)+
Math.pow(a.y-b.y,2)
)

}

function onResults(results){

if(results.multiFaceLandmarks.length===0){

document.getElementById("result").innerHTML="No se detectó un rostro"
return

}

const landmarks = results.multiFaceLandmarks[0]

for(let p of landmarks){

ctx.beginPath()
ctx.arc(p.x*canvas.width,p.y*canvas.height,1,0,2*Math.PI)
ctx.fillStyle="lime"
ctx.fill()

}

let leftCheek = landmarks[234]
let rightCheek = landmarks[454]
let chin = landmarks[152]
let forehead = landmarks[10]

let faceWidth = distance(leftCheek,rightCheek)
let faceHeight = distance(forehead,chin)

let FWHR = faceWidth/faceHeight

document.getElementById("result").innerHTML =
"FWHR Ratio: " + FWHR.toFixed(2)

}

</script>

</body>
</html>
